# This is a Databricks asset bundle definition for dw.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: elt-databricks-project
  uuid: 53c8d592-0ad4-4ef3-8d8b-e5e036aa84d0

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-cd1e91f8-5121.cloud.databricks.com
    variables:
      catalog: workspace
  prod:
    mode: production
    workspace:
      host: https://dbc-cd1e91f8-5121.cloud.databricks.com
      root_path: /Workspace/Users/lesliefloresbreakback@subasa.us/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
    permissions:
      - user_name: lesliefloresbreakback@subasa.us
        level: CAN_MANAGE
